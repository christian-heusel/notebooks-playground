name: Slash Command Handler

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  handle-slash-command:
    if: |
      github.event.issue.pull_request == null
      && contains('["thesuperzapper", "ederign", "andyatmiami", "paulovmr", "jenny-s51", "harshad16", "thaorell", "liavweiss", "christian-heusel"]', github.event.comment.user.login)
      && (
          contains(github.event.comment.body, '/add-sub-issue')
          || contains(github.event.comment.body, '/remove-sub-issue')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Handle slash commands
        id: handle-commands
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          PARENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          parse_issue_number() {
            local input="$1"
            if [[ "$input" =~ ^[0-9]+$ ]]; then
              echo "$input"
            elif [[ "$input" =~ ^#([0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]}"
            elif [[ "$input" =~ /issues/([0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]}"
            else
              echo "Could not parse issue number from input: '$input'" >&2
              return 1
            fi
          }

          declare -a add_issues=()
          declare -a remove_issues=()

          while IFS= read -r line; do
            for action in add remove; do
              prefix="/${action}-sub-issue"
              if [[ "$line" == "$prefix"* ]]; then
                rest="${line#"$prefix"}"
                for token in $rest; do
                  issue_number=$(parse_issue_number "$token")
                  if [[ "$action" == "add" ]]; then
                    add_issues+=("$issue_number")
                  else
                    remove_issues+=("$issue_number")
                  fi
                done
              fi
            done
          done <<< "$COMMENT_BODY"

          if [[ ${#add_issues[@]} -eq 0 && ${#remove_issues[@]} -eq 0 ]]; then
            echo "No valid operations found"
            exit 0
          fi

          parent_title=$(gh issue view "$PARENT_ISSUE_NUMBER" --json title --jq '.title')

          {
            echo ':mag: **Sub-issue Operation Preview**'
            echo ''
            echo "The following operations will be performed on issue #${PARENT_ISSUE_NUMBER} (${parent_title}) at the request of @${COMMENT_USER}:"
            echo ''
            if [[ ${#add_issues[@]} -gt 0 ]]; then
              echo '### Adding Sub-issues:'
              for i in "${add_issues[@]}"; do echo "- #${i}"; done
              echo ''
            fi
            if [[ ${#remove_issues[@]} -gt 0 ]]; then
              echo '### Removing Sub-issues:'
              for i in "${remove_issues[@]}"; do echo "- #${i}"; done
              echo ''
            fi
            echo '_This is a preview of the changes. The actual operations will be executed in the background._'
          } > preview_body.md

          preview_url=$(gh issue comment "$PARENT_ISSUE_NUMBER" --body-file preview_body.md | tail -n1)

          for i in "${add_issues[@]}"; do
            gh issue edit "$PARENT_ISSUE_NUMBER" --add-sub-issue "$i"
          done
          for i in "${remove_issues[@]}"; do
            gh issue edit "$PARENT_ISSUE_NUMBER" --remove-sub-issue "$i"
          done

          {
            echo ':white_check_mark: **GitHub Action Succeeded**'
            echo ''
            echo "All [sub-issue operations](${preview_url}) requested by @${COMMENT_USER} have been completed successfully."
            echo ''
          } > success_body.md

          gh issue comment "$PARENT_ISSUE_NUMBER" --body-file success_body.md

      - name: Post error comment if failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          PARENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo ':x: **GitHub Action Failed**'
            echo ''
            echo "The workflow encountered an error while processing [your comment](${COMMENT_URL}) to manage sub-issues."
            echo ''
            echo ":point_right: [View the run](${run_url})"
            echo ''
            echo 'Please check the logs and try again, or open a bug report if the issue persists.'
          } > error_body.md

          gh issue comment "$PARENT_ISSUE_NUMBER" --body-file error_body.md
